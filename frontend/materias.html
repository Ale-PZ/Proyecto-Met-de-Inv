<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Materias</title>
</head>

<body>

    <!-- NAVBAR -->

        <a class="nombreapp" href="index.html">
            TareasName

        <a class="navlink" href="index.html">

    <!-- TITULO -->
    <h1>Mis Materias</h1>

    <!-- FORMULARIO -->
    <div class="form-container">

        <h2>Nueva materia</h2>

        <form id="formMateria">

            <label>Nombre de la materia</label>
            <input type="text" name="nombre_materia" placeholder="Ingrese el nombre de la materia">

            <label>Profesor</label>
            <input type="text" name="profesor" placeholder="Ingrese el nombre del profesor">

            <label>Grupo</label>
            <input type="text" name="grupo" placeholder="Ejemplo: IS 203">

            <button type="submit">
                Guardar materia
            </button>

        </form>

    </div>

    <!-- LISTA DE MATERIAS -->
    <div class="materias-container">

        <h2>Lista de materias</h2>
        <div id="listaMaterias"></div>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
