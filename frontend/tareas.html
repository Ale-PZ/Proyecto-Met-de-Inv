<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Tareas</title>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="barranav" style="background-color: #d75674;">

        <a class="nombreapp" href="index.html">
            TareasName
        </a>

        <a class="navlink" href="index.html">
            Inicio
        </a>

        <a class="navlink" href="tareas.html">
            Tareas
        </a>

        <a class="navlink" href="materias.html">
            Materias
        </a>

    </nav>

    <!-- TITULO -->
    <h1>Mis Tareas</h1>

    <!-- FORMULARIO -->
    <div class="form-container">

        <h2>Nueva tarea</h2>

        <form id="formTarea">

            <label>Nombre de la tarea</label>
            <input type="text" name="titulo" placeholder="Ingrese el nombre">

            <label>Descripción</label>
            <textarea name="descripcion" placeholder="Ingrese una descripción"></textarea>

            <label>Materia</label>
            <select name="id_materia" id="selectMaterias" required>
                <option value="">Seleccione una materia</option>
            </select>

            <label>Fecha de entrega</label>
            <input type="date" name="fecha_entrega" required>

            <label>Estado</label>

            <select name="estado">
                <option value="Activa">Activa</option>
                <option value="Terminada">Terminada</option>
                <option value="Atrasada">Atrasada</option>
            </select>

            <button type="submit">
                Guardar tarea
            </button>

        </form>

    </div>

    <!-- LISTA DE TAREAS -->
    <div class="tareas-container">

        <h2>Lista de tareas</h2>

       <div id="listaTareas"></div>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist
</body>
</html>
